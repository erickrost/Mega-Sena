version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: megasena_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/megasena.csv:/megasena.csv
    ports:
      - "5433:5432"
    networks:
      - megasena_net

  server:
    build: ./server
    container_name: megasena_server
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SERVER_PORT: ${SERVER_PORT}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - megasena_net

  front:
    build: ./front
    container_name: megasena_front
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - megasena_net

networks:
  megasena_net:
    driver: bridge